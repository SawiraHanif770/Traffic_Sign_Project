name: Sync to Hugging Face spaces
on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git configuration set karna taake koi identity error na aaye
          git config --global user.email "sawira@example.com"
          git config --global user.name "SawiraHanif770"

          # Files ko repository ki history se permanent remove karna taake HF accept kar le
          git rm --cached -r old_code/Support/Traffic\ sign.gif || true
          git rm --cached -r outputs/sample_images.png || true
          
          # Changes ko local temporary commit dena
          git commit -m "Exclude binary files for Hugging Face" || true

          # Hugging Face par push karna
          git remote add space https://sawira770:$HF_TOKEN@huggingface.co/spaces/sawira770/Traffic_sign-recognition || true
          git push --force space main
