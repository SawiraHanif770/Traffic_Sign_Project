name: Sync to Hugging Face spaces
on:
  push:
    branches: [main]

  # Is se aap GitHub se manually bhi trigger kar sakti hain
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://sawira770:$HF_TOKEN@huggingface.co/spaces/sawira770/traffic-sign-recognition main
